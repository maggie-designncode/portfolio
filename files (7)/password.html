<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maggie Chen · UX Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #283618;
    --green-mid: #606c38;
    --bg: #f7f6f3;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dcc8;
    --navy: #003049;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 360px;
  }

  .logo {
    font-family: 'Manrope', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green-dark);
    letter-spacing: -0.01em;
    margin-bottom: 3rem;
    display: block;
  }

  .label {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .input-wrap {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  input[type="password"] {
    flex: 1;
    padding: 0.65rem 1rem;
    border: 1.5px solid var(--border);
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="password"]:hover {
    border-color: var(--green-mid);
  }

  input[type="password"]:focus {
    border-color: var(--green-dark);
  }

  button {
    padding: 0.65rem 1.25rem;
    background: var(--green-dark);
    color: #fff;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: var(--green-mid); }

  .error {
    font-size: 0.75rem;
    color: #a63d2f;
    margin-top: 0.5rem;
    display: none;
  }

  .contact {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .contact a {
    color: var(--navy);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,48,73,0.2);
    transition: border-color 0.2s;
  }

  .contact a:hover { border-color: var(--navy); }
</style>
</head>
<body>
<div class="container">
  <p class="label">Password required.</p>
  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="Enter password" autofocus />
    <button onclick="checkPassword()">Enter</button>
  </div>
  <p class="error" id="error">Incorrect password.</p>
  <p class="contact">Need access? <a href="mailto:chenchimaggie@gmail.com">Get in touch.</a></p>
</div>

<script>
  // Check if already authenticated this session
  if (sessionStorage.getItem('auth') === 'true') {
    window.location.href = 'index.html';
  }

  function checkPassword() {
    const input = document.getElementById('pwd').value;
    const error = document.getElementById('error');
    if (input === 'maggiedesigns') {
      sessionStorage.setItem('auth', 'true');
      window.location.href = 'index.html';
    } else {
      error.style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }

  // Allow enter key
  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>
</body>
</html>
